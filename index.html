<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稟軒會考衝刺首頁 - SAI 應試覺醒 V14.6</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap');
        
        body { margin: 0; padding: 0; overflow-x: hidden; font-family: 'Noto Sans TC', sans-serif; background: #FDFBF7; scroll-behavior: smooth; }
        .vibrant-bg { background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); position: relative; min-height: 100vh; }
        .go-board-overlay { position: fixed; inset: 0; background-image: linear-gradient(#8b4513 0.5px, transparent 0.5px), linear-gradient(90deg, #8b4513 0.5px, transparent 0.5px); background-size: 40px 40px; opacity: 0.1; pointer-events: none; z-index: 0; }
        
        .glass-card { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        .tag-國文 { background: #ef4444; color: white; }
        .tag-英文 { background: #3b82f6; color: white; }
        .tag-數學 { background: #f59e0b; color: white; }
        .tag-自然 { background: #10b981; color: white; }
        .tag-社會 { background: #8b5cf6; color: white; }
        .tag-其他 { background: #6b7280; color: white; }

        .loading-overlay { position: fixed; inset: 0; background: #2D2D2D; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #4b0082; border-top: 4px solid #ffd700; border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-spinner { animation: spin 1s linear infinite; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.5s both; }

        .mom-quote-card {
            background: linear-gradient(135deg, #ffffff 0%, #fef2f2 100%);
            border-left: 6px solid #fb7185;
            transition: all 0.3s ease;
        }
        .mom-quote-card:active { transform: scale(0.98); }

        .modal-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* 輪盤動畫 */
        .wheel-transition { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }

        /* 刮刮樂 Canvas 樣式 */
        .scratch-container { position: relative; width: 280px; height: 150px; cursor: crosshair; }
        .scratch-prize { position: absolute; inset: 0; display: flex; items-center: center; justify-center: center; font-weight: 900; background: #fff; border-radius: 12px; }
        .scratch-canvas { position: absolute; inset: 0; border-radius: 12px; }

        /* 抽籤晃動 */
        @keyframes shake-box {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }
        .animate-shake-box { animation: shake-box 0.3s infinite; }
        .fade-message { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="vibrant-bg">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const myFirebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAo6qGtng1z3SAn86wMrtFKLkVmPPCEVSU",
            authDomain: "exam-8ae8d.firebaseapp.com",
            projectId: "exam-8ae8d",
            storageBucket: "exam-8ae8d.firebasestorage.app",
            messagingSenderId: "988791791039",
            appId: "1:988791791039:web:acd9437a7b4a546bafd50a",
            measurementId: "G-TD30PX25GY"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, serverTimestamp, setDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const app = initializeApp(myFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'exam-8ae8d';
        const apiKey = ""; 

        const SUBJECTS = ["國文", "英文", "數學", "自然", "社會", "其他"];
        const PRIZES = [1, 2, 3, 5, 10, 2, 8, 1]; 

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return (
                <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const TimeUnit = ({ label, value }) => (
            <div className="flex-1">
                <div className="bg-stone-800 rounded sm:rounded-xl border border-amber-500/80 shadow-lg px-1.5 py-1 sm:px-2.5 sm:py-2 flex items-baseline justify-center gap-0.5 sm:gap-1">
                    <span className="text-lg sm:text-4xl font-black tabular-nums text-amber-400 leading-none">
                        {String(value).padStart(2, '0')}
                    </span>
                    <span className="text-[9px] sm:text-sm font-black text-amber-200/40 uppercase tracking-tighter">{label}</span>
                </div>
            </div>
        );

        const ScratchCard = ({ onWin }) => {
            const canvasRef = useRef(null);
            const [prize] = useState(() => Math.floor(Math.random() * 10) + 1);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#A0A0A0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#808080';
                ctx.lineWidth = 1;
                for(let i=0; i<20; i++) {
                    ctx.beginPath();
                    ctx.moveTo(Math.random()*canvas.width, Math.random()*canvas.height);
                    ctx.lineTo(Math.random()*canvas.width, Math.random()*canvas.height);
                    ctx.stroke();
                }
            }, []);

            const handleScratch = (e) => {
                if (isFinished) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let clearPixels = 0;
                for (let i = 3; i < imageData.data.length; i += 4) { if (imageData.data[i] === 0) clearPixels++; }
                if (clearPixels > imageData.data.length / 4 * 0.5) {
                    setIsFinished(true);
                    onWin(prize);
                }
            };

            return (
                <div className="scratch-container mx-auto bg-stone-100 rounded-xl overflow-hidden border-2 border-stone-200 shadow-inner">
                    <div className="scratch-prize text-3xl text-rose-600 italic"><span className="text-sm mr-1">獎學金</span>${prize}</div>
                    <canvas ref={canvasRef} width={280} height={150} className="scratch-canvas" onMouseMove={handleScratch} onTouchMove={handleScratch} />
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            
            // --- 雲端狀態取代本地狀態 ---
            const [nickname, setNickname] = useState("");
            const [scholarship, setScholarship] = useState(0);
            const [gameChances, setGameChances] = useState(0);
            const [statsLoaded, setStatsLoaded] = useState(false); // 確保雲端讀取完成
            
            const [tasks, setTasks] = useState([]); 
            const [isLoading, setIsLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [viewMode, setViewMode] = useState("active"); 
            const [inputMode, setInputMode] = useState("photo"); 
            const [selectedSubject, setSelectedSubject] = useState("全部");
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            
            const [showGameCenter, setShowGameCenter] = useState(false);
            const [activeGame, setActiveGame] = useState("wheel");
            const [isSpinning, setIsSpinning] = useState(false);
            const [wheelRotation, setWheelRotation] = useState(0);
            const [isShaking, setIsShaking] = useState(false);
            const [lastPrize, setLastPrize] = useState(null);

            const [aiMessage, setAiMessage] = useState(null);
            const [activeExamTask, setActiveExamTask] = useState(null); 
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [isDeleting, setIsDeleting] = useState(false);
            const [croppingImage, setCroppingImage] = useState(null); 
            const [isProcessingCrop, setIsProcessingCrop] = useState(false); 
            const [isPreCompressing, setIsPreCompressing] = useState(false);
            const cropperRef = useRef(null);
            const cropperImgRef = useRef(null);
            const [showWebcam, setShowWebcam] = useState(false);
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [shakingItems, setShakingItems] = useState([]);
            const [momMessage, setMomMessage] = useState("稟軒，這一步是通往夢想的神之一手。加油！");
            const [isMessageLoading, setIsMessageLoading] = useState(false);

            const [newTask, setNewTask] = useState("");
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
            const [newCategory, setNewCategory] = useState("國文");
            const [previewList, setPreviewList] = useState([]); 
            const fileInputRef = useRef(null);

            const targetDate = useMemo(() => new Date('2026-05-16T00:00:00'), []);
            const todayStr = useMemo(() => new Date().toISOString().split('T')[0], []);

            // 1. 初始化 Auth (嚴格執行在 useEffect 空陣列中)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("登入失敗:", e);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. 登入後同步雲端資料 (任務清單 + 個人獎學金)
            useEffect(() => {
                if (!user) return;

                // 訂閱公共任務清單
                const qTasks = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'));
                const unsubTasks = onSnapshot(qTasks, (snap) => {
                    setTasks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, (err) => console.error("任務讀取錯誤:", err));

                // 訂閱私人獎學金與次數
                const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
                const unsubStats = onSnapshot(statsRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setNickname(data.nickname || "");
                        setScholarship(data.scholarship || 0);
                        setGameChances(data.gameChances || 0);
                        setStatsLoaded(true);
                    } else {
                        // 第一次建立雲端檔案，順便繼承舊的 localStorage
                        const savedNickname = localStorage.getItem('sai_nickname');
                        const p = ["進藤", "藤原", "塔矢", "SAI", "本因坊", "神之", "應試"];
                        const n = ["稟軒", "大師", "覺醒", "棋聖", "國手", "佐為"];
                        const rName = p[Math.floor(Math.random()*p.length)] + n[Math.floor(Math.random()*n.length)];
                        
                        const initialNickname = savedNickname || rName;
                        const initialScholarship = parseInt(localStorage.getItem('sai_money')) || 0;
                        const initialChances = parseInt(localStorage.getItem('sai_chances')) || 0;

                        setDoc(statsRef, {
                            nickname: initialNickname,
                            scholarship: initialScholarship,
                            gameChances: initialChances,
                            createdAt: serverTimestamp()
                        }).then(() => setStatsLoaded(true));
                    }
                }, (err) => console.error("狀態讀取錯誤:", err));

                return () => { unsubTasks(); unsubStats(); };
            }, [user]);

            // 監聽中獎訊息，3秒後自動消失
            useEffect(() => {
                if (lastPrize !== null) {
                    const timer = setTimeout(() => setLastPrize(null), 3000);
                    return () => clearTimeout(timer);
                }
            }, [lastPrize]);

            // 倒數計時
            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = targetDate - new Date();
                    if (diff <= 0) setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                    else setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                }, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            // AI 語句
            const fetchMomMessage = async (retryCount = 0) => {
                if (retryCount === 0) { if (isMessageLoading) return; setIsMessageLoading(true); }
                try {
                    const systemPrompt = "你是稟軒的媽媽，佐為。請生成一句全新的、溫馨、勵志且具有圍棋精神的話來鼓勵稟軒面對國中會考。字數控制在15-25字內。";
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const response = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts: [{ text: "現在給我一句鼓勵的話。" }] }], systemInstruction: { parts: [{ text: systemPrompt }] } }) 
                    });
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) setMomMessage(text.trim());
                } catch (err) {
                    if (retryCount < 5) { setTimeout(() => fetchMomMessage(retryCount + 1), Math.pow(2, retryCount) * 1000); return; }
                    setMomMessage("稟軒，不論遇到什麼困難，媽媽永遠支持你，全力衝刺吧！");
                } finally { if (retryCount === 0 || retryCount >= 5) setIsMessageLoading(false); }
            };

            useEffect(() => { fetchMomMessage(); }, [viewMode]);

            // --- 核心更新：將獎勵寫入雲端 ---
            const grantChance = async () => {
                if (!user) return;
                setGameChances(prev => prev + 1); // 畫面先更新
                setAiMessage({ text: "答對了！獲得一次遊戲機會！", status: 'correct' });
                setTimeout(() => setAiMessage(null), 2000);
                
                // 雲端安全累加
                const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
                await updateDoc(statsRef, { gameChances: increment(1) });
            };

            const applyGameResult = async (prize) => {
                if (!user) return;
                setScholarship(prev => prev + prize);
                setGameChances(prev => prev - 1);
                setLastPrize(prize);
                
                // 雲端安全結算
                const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
                await updateDoc(statsRef, { 
                    scholarship: increment(prize),
                    gameChances: increment(-1) 
                });
            };

            // 任務操作
            const addTask = async (e) => {
                e.preventDefault();
                if (inputMode === 'photo') {
                    const invalidItems = previewList.filter(item => item.qType === 'choice' && !item.answer);
                    if (invalidItems.length > 0) { setShakingItems(invalidItems.map(i => i.id)); setTimeout(() => setShakingItems([]), 600); return; }
                } else if (!newTask.trim()) return;
                
                setIsSubmitting(true);
                const itemsToUpload = [...previewList];
                const content = newTask; const date = newDate; const category = newCategory;
                setPreviewList([]); setNewTask("");
                try {
                    if (inputMode === 'photo') {
                        await Promise.all(itemsToUpload.map(item => addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { 
                            type: 'photo', questionType: item.qType, content: "", date, category, imageUrl: item.dataUrl, correctAnswer: item.answer, 
                            completed: false, wasIncorrect: false, status: 'active', createdAt: serverTimestamp(), attempts: 0
                        })));
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { 
                            type: 'text', content, date, category, completed: false, wasIncorrect: false, status: 'active', createdAt: serverTimestamp(), attempts: 0 
                        });
                    }
                } finally { setIsSubmitting(false); }
            };

            const handleDelete = async () => {
                if (!deleteTarget || isDeleting) return;
                setIsDeleting(true);
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', deleteTarget)); } 
                finally { setIsDeleting(false); setDeleteTarget(null); }
            };

            const cycleTaskCategory = async (task) => {
                const cur = SUBJECTS.indexOf(task.category || "其他");
                const next = SUBJECTS[(cur + 1) % SUBJECTS.length];
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { category: next });
            };

            const handleTextDone = async (task) => {
                await grantChance(); // 先給予獎勵
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { completed: true, status: 'archived', completedAt: serverTimestamp(), attempts: (task.attempts || 0) + 1 }); 
            };

            const submitAnswer = async (task, inputAnswer) => {
                const correctAns = (task.correctAnswer || "").trim().toUpperCase();
                const newAttempts = (task.attempts || 0) + 1;
                if (inputAnswer.trim().toUpperCase() === correctAns) {
                    await grantChance(); // 先給予獎勵
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { completed: true, status: 'archived', completedAt: serverTimestamp(), attempts: newAttempts }); 
                    setActiveExamTask(null);
                } else {
                    setAiMessage({ text: "不通！", status: 'wrong' });
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { wasIncorrect: true, status: 'needsReview', attempts: newAttempts });
                    setTimeout(() => setAiMessage(null), 800);
                }
            };

            // 圖片處理
            const handleFileSelect = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsPreCompressing(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1600; let w = img.width, h = img.height;
                        if (w > MAX_WIDTH) { h = Math.round((h * MAX_WIDTH) / w); w = MAX_WIDTH; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setCroppingImage(canvas.toDataURL('image/jpeg', 0.9));
                        setIsPreCompressing(false);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file); e.target.value = "";
            };

            const startWebcam = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream; setShowWebcam(true);
                    setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = stream; }, 100);
                } catch (err) { alert("無法存取相機"); }
            };

            const capturePhoto = () => {
                const video = videoRef.current;
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth > 1600 ? 1600 : video.videoWidth;
                canvas.height = (canvas.width * video.videoHeight) / video.videoWidth;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                setShowWebcam(false); setCroppingImage(dataUrl); 
            };

            const finalizeCrop = () => {
                if (isProcessingCrop || !cropperRef.current) return;
                setIsProcessingCrop(true);
                setTimeout(() => {
                    const canvas = cropperRef.current.getCroppedCanvas({ maxWidth: 1600, maxHeight: 1600 });
                    setPreviewList(prev => [...prev, { id: Math.random().toString(36).substr(2, 9), dataUrl: canvas.toDataURL('image/jpeg', 0.8), qType: 'choice', answer: null }]);
                    if (cropperRef.current) cropperRef.current.destroy();
                    cropperRef.current = null; setCroppingImage(null); setIsProcessingCrop(false);
                }, 50);
            };

            // 遊戲中心操作
            const openGameCenter = () => {
                setLastPrize(null);
                setShowGameCenter(true);
            };

            const playWheel = () => {
                if (gameChances <= 0 || isSpinning) return;
                setIsSpinning(true); setLastPrize(null);
                const extra = 5 + Math.floor(Math.random() * 5);
                const pIdx = Math.floor(Math.random() * PRIZES.length);
                const newRot = wheelRotation + (extra * 360) + (pIdx * (360/PRIZES.length));
                setWheelRotation(newRot);
                setTimeout(() => {
                    setIsSpinning(false);
                    const prize = PRIZES[(PRIZES.length - (pIdx % PRIZES.length)) % PRIZES.length];
                    applyGameResult(prize);
                }, 4000);
            };

            const playLots = () => {
                if (gameChances <= 0 || isShaking) return;
                setIsShaking(true); setLastPrize(null);
                setTimeout(() => {
                    setIsShaking(false);
                    const prize = Math.floor(Math.random() * 10) + 1;
                    applyGameResult(prize);
                }, 1500);
            };

            const sortedTasks = useMemo(() => {
                return [...tasks].sort((a, b) => (a.date || "9999-99-99").localeCompare(b.date || "9999-99-99")).map((t, idx) => ({ ...t, globalIndex: idx + 1 }));
            }, [tasks]);

            const listToDisplay = useMemo(() => {
                let f = sortedTasks;
                if (selectedSubject !== "全部") f = f.filter(t => t.category === selectedSubject);
                if (viewMode === 'active') return f.filter(t => !t.completed && (t.date || "9999-99-99") <= todayStr);
                if (viewMode === 'future') return f.filter(t => (t.date || "9999-99-99") > todayStr);
                return f.filter(t => t.completed).reverse().slice(0, 20);
            }, [sortedTasks, viewMode, todayStr, selectedSubject]);

            const counts = useMemo(() => ({
                active: sortedTasks.filter(t => !t.completed && (t.date || "9999-99-99") <= todayStr).length,
                future: sortedTasks.filter(t => (t.date || "9999-99-99") > todayStr).length,
                history: sortedTasks.filter(t => t.completed).length
            }), [sortedTasks, todayStr]);

            // 安全防護：確保雲端資料載入完畢才顯示畫面，避免覆蓋或閃爍
            if (!user || isLoading || !statsLoaded) return <div className="loading-overlay"><div className="spinner"></div></div>;

            return (
                <div className="min-h-screen relative pb-24 text-[#2D2D2D]">
                    <div className="go-board-overlay"></div>

                    {/* 刪除確認彈窗 */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[8000] flex items-center justify-center p-4 modal-blur animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-stone-200 overflow-hidden">
                                <div className="p-6 text-center">
                                    <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32} /></div>
                                    <h3 className="text-xl font-black mb-2">確定要刪除嗎？</h3>
                                    <p className="text-stone-500 font-bold text-sm">此操作將無法復原。</p>
                                </div>
                                <div className="flex border-t">
                                    <button onClick={() => setDeleteTarget(null)} className="flex-1 py-4 font-black text-stone-500 hover:bg-stone-50">取消</button>
                                    <button onClick={handleDelete} className="flex-1 py-4 bg-red-600 text-white font-black hover:bg-red-700">{isDeleting ? <Icon name="loader-2" className="btn-spinner" /> : "確認刪除"}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 相機介面 */}
                    {showWebcam && (
                        <div className="fixed inset-0 z-[9000] bg-black flex flex-col items-center justify-center p-4">
                            <video ref={videoRef} autoPlay playsInline className="w-full max-w-2xl rounded-xl border-4 border-white/20"></video>
                            <div className="mt-6 flex gap-4 w-full max-w-sm">
                                <button onClick={() => { if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); setShowWebcam(false); }} className="flex-1 py-3 bg-white/10 text-white rounded-xl font-bold">取消</button>
                                <button onClick={capturePhoto} className="flex-2 flex-[2] py-3 bg-amber-500 text-black rounded-xl font-black">立即拍照</button>
                            </div>
                        </div>
                    )}

                    {/* 剪裁介面 */}
                    {croppingImage && (
                        <div className="fixed inset-0 z-[9100] bg-black/90 flex flex-col items-center justify-center p-4">
                            <div className="w-full max-w-2xl h-[60vh] bg-stone-900 rounded-lg overflow-hidden mb-4">
                                <img ref={cropperImgRef} src={croppingImage} onLoad={() => cropperRef.current = new Cropper(cropperImgRef.current, { viewMode: 1 })} className="hidden" />
                            </div>
                            <div className="flex gap-4 w-full max-w-md">
                                <button onClick={() => setCroppingImage(null)} className="flex-1 py-3 bg-white/10 text-white rounded-xl font-bold">取消</button>
                                <button onClick={finalizeCrop} className="flex-2 flex-[2] py-3 bg-amber-500 text-black rounded-xl font-black">{isProcessingCrop ? "處理中..." : "確認剪裁"}</button>
                            </div>
                        </div>
                    )}

                    {/* 遊戲中心 Modal */}
                    {showGameCenter && (
                        <div className="fixed inset-0 z-[9500] flex items-center justify-center p-4 modal-blur animate-in fade-in">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-4 border-amber-500 relative">
                                <button onClick={() => setShowGameCenter(false)} className="absolute top-4 right-4 z-10 p-2 bg-stone-100 rounded-full"><Icon name="x" size={20}/></button>
                                <div className="bg-amber-500 p-6 text-center text-stone-900">
                                    <h2 className="text-2xl font-black mb-1">神之遊戲場</h2>
                                    <div className="flex justify-center gap-4 text-sm font-bold opacity-80">
                                        <span>次數: {gameChances}</span><span>獎金: ${scholarship}</span>
                                    </div>
                                </div>
                                <div className="p-6">
                                    <div className="flex gap-2 mb-8 bg-stone-100 p-1 rounded-xl">
                                        {['wheel', 'lots', 'scratch'].map(g => (
                                            <button key={g} onClick={() => { setLastPrize(null); setActiveGame(g); }} className={`flex-1 py-2 text-xs font-black rounded-lg ${activeGame===g?'bg-white shadow':'text-stone-400'}`}>
                                                {g==='wheel'?'輪盤':g==='lots'?'抽籤':'刮刮樂'}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="min-h-[250px] flex flex-col items-center justify-center">
                                        {activeGame === 'wheel' && (
                                            <div className="relative w-48 h-48 sm:w-56 sm:h-56">
                                                <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-10 text-amber-600"><Icon name="chevron-down" size={32} /></div>
                                                <div className="w-full h-full rounded-full border-8 border-stone-800 shadow-xl relative overflow-hidden wheel-transition"
                                                    style={{ transform: `rotate(-${wheelRotation}deg)`, background: 'conic-gradient(#ef4444 0 45deg, #3b82f6 45deg 90deg, #f59e0b 90deg 135deg, #10b981 135deg 180deg, #8b5cf6 180deg 225deg, #ec4899 225deg 270deg, #06b6d4 270deg 315deg, #f97316 315deg 360deg)' }}>
                                                    {PRIZES.map((p, i) => (
                                                        <div key={i} className="absolute top-0 left-1/2 -translate-x-1/2 h-1/2 origin-bottom font-black text-white py-2 text-sm" style={{ transform: `rotate(${i * 45 + 22.5}deg)` }}>${p}</div>
                                                    ))}
                                                </div>
                                                <button disabled={gameChances <= 0 || isSpinning} onClick={playWheel} className="absolute inset-0 m-auto w-14 h-14 bg-stone-900 rounded-full border-4 border-white text-white font-black text-xs shadow-lg active:scale-95 disabled:opacity-50">{isSpinning ? '...' : 'SPIN'}</button>
                                            </div>
                                        )}
                                        {activeGame === 'lots' && (
                                            <div className="text-center">
                                                <div className={`w-32 h-44 bg-amber-700 rounded-t-3xl rounded-b-lg border-x-8 border-amber-800 mx-auto mb-6 relative flex items-center justify-center shadow-2xl ${isShaking ? 'animate-shake-box' : ''}`}>
                                                    <div className="w-4 h-4 bg-stone-900 rounded-full absolute -top-2"></div>
                                                    <span className="text-amber-200 font-black text-4xl opacity-30">SAI</span>
                                                </div>
                                                <button disabled={gameChances <= 0 || isShaking} onClick={playLots} className="px-8 py-3 bg-amber-600 text-white rounded-full font-black shadow-lg active:scale-95 disabled:opacity-50">搖動籤筒</button>
                                            </div>
                                        )}
                                        {activeGame === 'scratch' && (
                                            <div key={gameChances}>
                                                {gameChances > 0 ? <ScratchCard onWin={(p) => applyGameResult(p)} /> : <div className="text-stone-400 font-bold italic">次數已用完</div>}
                                            </div>
                                        )}
                                    </div>
                                    {lastPrize !== null && <div className="mt-6 text-center animate-bounce"><div className="inline-block bg-rose-500 text-white px-4 py-2 rounded-full font-black shadow-lg">恭喜獲得 ${lastPrize}！</div></div>}
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-gradient-to-r from-indigo-950 via-stone-900 to-indigo-950 text-white py-5 px-4 text-center shadow-md relative z-10 border-b-4 border-amber-500">
                        <div className="max-w-4xl mx-auto flex flex-col items-center">
                            <div className="flex items-center gap-4 mb-4">
                                <div className="bg-white/10 px-3 py-1.5 rounded-full border border-white/20 flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-green-400"></div>
                                    <span className="text-[10px] font-black tracking-widest text-white uppercase">{nickname}</span>
                                </div>
                                <div onClick={openGameCenter} className="bg-amber-500 px-3 py-1.5 rounded-full border border-amber-400 flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform">
                                    <Icon name="gem" size={14} className="text-stone-900" />
                                    <span className="text-[10px] font-black text-stone-900 uppercase">獎學金: ${scholarship}</span>
                                    <div className="bg-stone-900 text-amber-500 text-[8px] px-1.5 rounded-full">{gameChances} 次</div>
                                </div>
                            </div>
                            <h1 className="text-xl sm:text-2xl font-black mb-4 tracking-tight">稟軒，引導勝利的神之一手！</h1>
                            <div className="grid grid-cols-4 gap-1 w-full max-w-sm">
                                <TimeUnit label="天" value={timeLeft.d} /><TimeUnit label="時" value={timeLeft.h} /><TimeUnit label="分" value={timeLeft.m} /><TimeUnit label="秒" value={timeLeft.s} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-2 sm:px-6 py-4 relative z-10">
                        <div className="grid lg:grid-cols-12 gap-4">
                            <div className="lg:col-span-4 space-y-4">
                                <div onClick={() => fetchMomMessage()} className="mom-quote-card p-4 rounded-xl shadow-md border border-rose-100 flex items-start gap-3 cursor-pointer group">
                                    <div className="bg-rose-500 text-white p-2 rounded-lg shrink-0"><Icon name="heart" size={16} className={isMessageLoading ? "animate-spin" : ""} /></div>
                                    <p className={`text-sm font-bold text-stone-700 leading-snug ${isMessageLoading ? "opacity-30" : "fade-message"}`}>「{momMessage}」</p>
                                </div>

                                <div className="glass-card p-4 rounded-2xl border border-stone-800 shadow-sm">
                                    <h2 className="font-black text-sm mb-3 flex items-center gap-1.5 text-stone-800"><div className="w-3 h-3 rounded-full bg-black"></div> 佈局策略</h2>
                                    <div className="flex bg-stone-100 rounded-lg p-0.5 mb-3 shadow-inner">
                                        <button onClick={() => setInputMode("photo")} className={`flex-1 py-1 text-[11px] font-black rounded-md transition-all ${inputMode === "photo" ? 'bg-white text-indigo-700 shadow-sm' : 'text-stone-400'}`}>拍照佈陣</button>
                                        <button onClick={() => setInputMode("text")} className={`flex-1 py-1 text-[11px] font-black rounded-md transition-all ${inputMode === "text" ? 'bg-white text-indigo-700 shadow-sm' : 'text-stone-400'}`}>文字任務</button>
                                    </div>
                                    <form onSubmit={addTask} className="space-y-3">
                                        <div className="flex flex-wrap gap-1">
                                            {SUBJECTS.map(s => <button key={s} type="button" onClick={() => setNewCategory(s)} className={`flex-1 min-w-[30%] py-1 text-[10px] font-black rounded transition-all ${newCategory===s?`tag-${s} ring-1 ring-offset-1`:'bg-stone-100 opacity-60'}`}>{s}</button>)}
                                        </div>
                                        <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full p-2 rounded-lg border text-xs font-bold" />
                                        
                                        {inputMode === 'photo' ? (
                                            <div className="space-y-2">
                                                <div className="flex gap-2">
                                                    <div onClick={() => !isPreCompressing && fileInputRef.current && fileInputRef.current.click()} className="flex-1 p-2 border-2 border-dashed border-stone-300 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-white min-h-[60px]">
                                                        <Icon name={isPreCompressing ? "loader-2" : "image"} className={isPreCompressing ? "btn-spinner" : ""} /><span className="text-[8px] font-black mt-1">選圖</span>
                                                        <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileSelect} className="hidden" />
                                                    </div>
                                                    <div onClick={startWebcam} className="flex-1 p-2 border-2 border-dashed border-stone-300 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-white min-h-[60px]"><Icon name="camera" /><span className="text-[8px] font-black mt-1">拍攝</span></div>
                                                </div>
                                                <div className="max-h-40 overflow-y-auto custom-scroll pr-1 space-y-2">
                                                    {previewList.map(item => (
                                                        <div key={item.id} className={`p-1.5 bg-white rounded-lg border flex flex-col gap-1 relative ${shakingItems.includes(item.id) ? 'animate-shake border-red-500' : 'border-stone-200'}`}>
                                                            <button type="button" onClick={() => setPreviewList(prev => prev.filter(i => i.id !== item.id))} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 z-10"><Icon name="x" size={8} /></button>
                                                            <div className="flex gap-2">
                                                                <img src={item.dataUrl} className="w-10 h-10 object-cover rounded" />
                                                                <div className="flex-1 flex gap-1">
                                                                    <button type="button" onClick={() => setPreviewList(prev => prev.map(i => i.id === item.id ? {...i, qType: 'choice'} : i))} className={`flex-1 py-1 text-[8px] font-black rounded border ${item.qType==='choice'?'bg-stone-800 text-white':'bg-white'}`}>選擇</button>
                                                                    <button type="button" onClick={() => setPreviewList(prev => prev.map(i => i.id === item.id ? {...i, qType: 'open'} : i))} className={`flex-1 py-1 text-[8px] font-black rounded border ${item.qType==='open'?'bg-stone-800 text-white':'bg-white'}`}>填空</button>
                                                                </div>
                                                            </div>
                                                            {item.qType === 'choice' ? (
                                                                <div className="flex gap-1">
                                                                    {["A", "B", "C", "D"].map(c => <button key={c} type="button" onClick={() => setPreviewList(prev => prev.map(i => i.id === item.id ? {...i, answer: c} : i))} className={`flex-1 py-1 rounded text-[10px] font-black transition-all ${item.answer===c?'bg-stone-900 text-white':'bg-stone-100 opacity-40'}`}>{c}</button>)}
                                                                </div>
                                                            ) : <input type="text" placeholder="輸入解答..." value={item.answer || ""} onChange={e => setPreviewList(prev => prev.map(i => i.id === item.id ? {...i, answer: e.target.value} : i))} className="w-full p-1 border rounded text-[9px]" />}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : <textarea placeholder="輸入任務內容..." value={newTask} onChange={e => setNewTask(e.target.value)} className="w-full p-2 rounded-lg border text-xs font-bold resize-none" rows="2" />}
                                        <button disabled={isSubmitting} className="w-full py-2.5 bg-stone-900 text-white rounded-lg font-black text-sm active:scale-95 disabled:opacity-50">確認佈局</button>
                                    </form>
                                </div>
                            </div>

                            <div className="lg:col-span-8">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
                                    <div className="flex bg-stone-200/60 p-1 rounded-xl">
                                        <button onClick={() => setViewMode('active')} className={`px-4 py-2 rounded-lg text-xs font-black ${viewMode==='active'?'bg-stone-900 text-white':'text-stone-500'}`}>待挑戰 ({counts.active})</button>
                                        <button onClick={() => setViewMode('history')} className={`px-4 py-2 rounded-lg text-xs font-black ${viewMode==='history'?'bg-stone-900 text-white':'text-stone-500'}`}>戰績榜 ({counts.history})</button>
                                    </div>
                                    <div onClick={openGameCenter} className="flex items-center gap-2 bg-rose-500 text-white px-4 py-2 rounded-xl font-black text-xs cursor-pointer animate-pulse"><Icon name="play-circle" size={16} /> 抽獎中心</div>
                                </div>

                                <div className="flex gap-2 mb-4 overflow-x-auto pb-1 custom-scroll">
                                    {["全部", ...SUBJECTS].map(s => <button key={s} onClick={() => setSelectedSubject(s)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black whitespace-nowrap transition-all ${selectedSubject===s?`tag-${s==='全部'?'其他':s} ring-2 ring-stone-900 ring-offset-1`:'bg-stone-200 text-stone-600'}`}>{s}</button>)}
                                </div>

                                <div className="bg-white/95 rounded-2xl border border-stone-100 shadow-sm overflow-hidden divide-y">
                                    {listToDisplay.map(task => (
                                        <div key={task.id} className="p-4 flex items-center justify-between group hover:bg-stone-50 transition-colors">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-stone-800 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded">#{task.globalIndex}</div>
                                                <button onClick={() => cycleTaskCategory(task)} className={`px-2 py-0.5 rounded text-[10px] font-black tag-${task.category}`}>{task.category}</button>
                                                {task.type === 'photo' ? (
                                                    <img onClick={() => setActiveExamTask(task)} src={task.imageUrl} className="w-10 h-10 object-cover rounded border cursor-zoom-in" />
                                                ) : <span className={`text-sm font-bold ${task.completed ? "line-through opacity-40" : ""}`}>{task.content}</span>}
                                                <span className="text-[10px] text-stone-400 font-bold">{task.date}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {task.type === 'text' && !task.completed && <button onClick={() => handleTextDone(task)} className="p-2 text-stone-300 hover:text-green-500"><Icon name="check-circle" size={24} /></button>}
                                                {task.type === 'photo' && !task.completed && <button onClick={() => setActiveExamTask(task)} className="px-3 py-1 bg-indigo-600 text-white text-[10px] font-black rounded-lg">解答</button>}
                                                {task.completed && <div className="flex items-center gap-1"><span className="text-[9px] font-black text-amber-600">{task.attempts}次</span><Icon name="award" className="text-amber-500" /></div>}
                                                <button onClick={() => setDeleteTarget(task.id)} className="p-2 text-stone-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {listToDisplay.length === 0 && <div className="p-16 text-center text-stone-400 font-bold italic">目前沒有對局項目</div>}
                                </div>
                            </div>
                        </div>
                    </main>

                    {activeExamTask && (
                        <div className="fixed inset-0 z-[8000] bg-black flex flex-col">
                            <div className="flex-1 relative bg-stone-900 flex items-center justify-center p-2">
                                <img src={activeExamTask.imageUrl} className="max-w-full max-h-full object-contain" />
                                <button onClick={() => setActiveExamTask(null)} className="absolute top-4 right-4 text-white p-2 bg-white/10 rounded-full"><Icon name="x" size={24} /></button>
                            </div>
                            <div className="bg-stone-900/95 p-6 border-t border-white/10">
                                <div className="max-w-xl mx-auto grid grid-cols-4 gap-4">
                                    {["A", "B", "C", "D"].map(c => (
                                        <button key={c} onClick={() => submitAnswer(activeExamTask, c)} className="py-4 rounded-xl font-black text-xl text-white bg-indigo-600 shadow-[0_4px_0_0_#312e81] active:translate-y-1 active:shadow-none">{c}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {aiMessage && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[9999] px-8 py-4 rounded-full shadow-2xl font-black text-lg text-white flex items-center gap-3 animate-bounce" style={{ background: aiMessage.status === 'correct' ? '#10b981' : '#ef4444' }}>
                            <Icon name={aiMessage.status === 'correct' ? "party-popper" : "alert-circle"} size={24} />{aiMessage.text}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
